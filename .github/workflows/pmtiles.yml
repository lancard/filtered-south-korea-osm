name: Build PMTiles (South Korea)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download South Korea PBF
        run: |
          wget https://download.geofabrik.de/asia/south-korea-latest.osm.pbf

      - name: Run tilemaker (PMTiles direct)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/data \
            systemed/tilemaker:latest \
            --input /data/south-korea-latest.osm.pbf \
            --output /data/south-korea.pmtiles \
            --config /opt/tilemaker/resources/config-openmaptiles.json \
            --process /opt/tilemaker/resources/process-openmaptiles.lua

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: south-korea-pmtiles
          path: south-korea.pmtiles
